services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-veyra}
      MYSQL_USER: ${DB_USER:-veyra}
      MYSQL_PASSWORD: ${DB_PASSWORD:-veyrapass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_ROOT_PASSWORD:-rootpass}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  # one app serves both API and static frontend - no separate frontend container needed
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-veyra}
      DB_PASSWORD: ${DB_PASSWORD:-veyrapass}
      DB_NAME: ${DB_NAME:-veyra}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@veyra.tech}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    volumes:
      - app_logs:/app/logs
    ports:
      - "3010:3010"

volumes:
  db_data:
  app_logs:
