<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Illustration of a cloud platform dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3ff"/>
      <stop offset="1" stop-color="#e6fbfa"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5a4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e3a8a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="520" height="420" rx="28" fill="url(#bg)"/>

  <!-- back cloud -->
  <g opacity="0.9">
    <path d="M150 120 a40 40 0 0 1 78 -10 a34 34 0 0 1 54 14 a30 30 0 0 1 -6 60 H168 a34 34 0 0 1 -18 -64 z"
          fill="#ffffff" filter="url(#sh)"/>
  </g>

  <!-- main dashboard card -->
  <g filter="url(#sh)">
    <rect x="70" y="150" width="380" height="210" rx="18" fill="#ffffff"/>
    <rect x="70" y="150" width="380" height="44" rx="18" fill="#0b1f3a"/>
    <rect x="70" y="176" width="380" height="18" fill="#0b1f3a"/>
    <circle cx="92" cy="172" r="5" fill="#ff6b6b"/>
    <circle cx="110" cy="172" r="5" fill="#ffd166"/>
    <circle cx="128" cy="172" r="5" fill="#06d6a0"/>
    <text x="160" y="177" font-family="Segoe UI, sans-serif" font-size="13" fill="#9fb0cb">console.veyra.tech</text>

    <!-- sidebar -->
    <rect x="86" y="210" width="92" height="134" rx="10" fill="#f3f6fc"/>
    <rect x="98" y="224" width="68" height="9" rx="4" fill="#cdd8ea"/>
    <rect x="98" y="244" width="56" height="9" rx="4" fill="#2563eb"/>
    <rect x="98" y="264" width="62" height="9" rx="4" fill="#cdd8ea"/>
    <rect x="98" y="284" width="48" height="9" rx="4" fill="#cdd8ea"/>
    <rect x="98" y="304" width="58" height="9" rx="4" fill="#cdd8ea"/>

    <!-- chart area -->
    <rect x="194" y="210" width="240" height="74" rx="10" fill="#f7f9fd"/>
    <polyline points="206,266 240,240 274,250 308,218 342,232 376,204 414,222"
              fill="none" stroke="url(#acc)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="376" cy="204" r="5" fill="#2563eb"/>

    <!-- stat tiles -->
    <rect x="194" y="296" width="74" height="48" rx="10" fill="url(#acc)"/>
    <text x="206" y="318" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#fff">99.98%</text>
    <text x="206" y="334" font-family="Segoe UI, sans-serif" font-size="9" fill="#cfe0ff">uptime</text>

    <rect x="277" y="296" width="74" height="48" rx="10" fill="url(#teal)"/>
    <text x="289" y="318" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#fff">5</text>
    <text x="289" y="334" font-family="Segoe UI, sans-serif" font-size="9" fill="#d2f5f2">regions</text>

    <rect x="360" y="296" width="74" height="48" rx="10" fill="#eef2f9"/>
    <text x="372" y="318" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#0b1f3a">4.2k</text>
    <text x="372" y="334" font-family="Segoe UI, sans-serif" font-size="9" fill="#6b7a90">customers</text>
  </g>

  <!-- floating nodes -->
  <circle cx="408" cy="116" r="26" fill="url(#teal)" filter="url(#sh)"/>
  <path d="M398 116 l7 7 l13 -14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="96" cy="96" r="18" fill="url(#acc)" filter="url(#sh)"/>
  <rect x="89" y="89" width="14" height="14" rx="3" fill="#fff" opacity="0.9"/>
</svg>
